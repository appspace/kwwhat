services:

  # ── Service 1 ──────────────────────────────────────────────────────────────
  # Loads CSV seed data into raw.duckdb (RAW catalog, SEED schema).
  # Runs once and exits — all other services wait for it to complete.
  duckdb-init:
    build: ./duckdb-init
    volumes:
      - duckdb-data:/data
      - ./seeds:/seeds:ro      # seed CSVs live here under demo/

  # ── Service 2 ──────────────────────────────────────────────────────────────
  # Runs dbt build: staging → intermediate → marts written to analytics.duckdb.
  # Then serves the dbt MCP server on port 8080 for the chat-bi service.
  dbt:
    build: ./dbt
    depends_on:
      duckdb-init:
        condition: service_completed_successfully
    volumes:
      - duckdb-data:/data
      - ../:/kwwhat:ro         # mount the kwwhat dbt project read-only
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s       # dbt build can take a while on first run

  # ── Service 3 ──────────────────────────────────────────────────────────────
  # Interactive chat interface. Waits for dbt to finish, then opens nao chat.
  # Run with: docker compose run --rm chat-bi
  chat-bi:
    build: ./chat-bi
    depends_on:
      dbt:
        condition: service_healthy
    volumes:
      - duckdb-data:/data      # read analytics.duckdb
    stdin_open: true
    tty: true
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

volumes:
  duckdb-data:
