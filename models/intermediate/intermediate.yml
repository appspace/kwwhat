version: 2

models:
  - name: int_connector_latest_status
    description: "Latest OCPP status snapshot per connector. View over int_status_changes filtered to rows where next_status is null. Grain: one row per charger_id + connector_id + port_id."
    columns:
      - name: charger_id
        description: "Identifier for the charge point"
        data_tests:
          - not_null
      - name: connector_id
        description: "Identifier for the connector"
        data_tests:
          - not_null
      - name: port_id
        description: "Identifier for the port"
        data_tests:
          - not_null
      - name: latest_status
        description: "Most recent OCPP status for this connector"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Available', 'Preparing', 'Charging', 'SuspendedEVSE', 'SuspendedEV', 'Finishing', 'Reserved', 'Unavailable', 'Faulted']
      - name: latest_error_code
        description: "Error code from the most recent StatusNotification"
        data_tests:
          - not_null
      - name: latest_status_ts
        description: "Timestamp when the most recent status was ingested"
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - charger_id
              - connector_id
              - port_id

  - name: int_status_changes
    description: "Intermediate model that tracks connector status changes with previous status tracking and confirmation status. Uses incremental processing with 30-minute buffer to ensure accurate previous_status relationships. Grain: one row per status notification."
    columns:
      - name: charger_id
        description: "Identifier for the charge point"
        data_tests:
          - not_null
      - name: unique_id
        description: "Unique identifier for the OCPP message"
        data_tests:
          - not_null
      - name: connector_id
        description: "Identifier for the connector"
        data_tests:
          - not_null
      - name: port_id
        description: "Identifier for the port, resolved from int_connectors"
        data_tests:
          - not_null
      - name: ingested_ts
        description: "Timestamp when the status notification was ingested"
        data_tests:
          - not_null
      - name: status
        description: "Current status from the notification"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Available', 'Preparing', 'Charging', 'SuspendedEVSE', 'SuspendedEV', 'Finishing', 'Reserved', 'Unavailable', 'Faulted']
      - name: error_code
        description: "Error code from the status notification payload (NoError if no error to report)"
        data_tests:
          - not_null        
      - name: payload
        description: "Original payload from the status notification"
      - name: previous_status
        description: "Previous status for the same charge point and connector (null for first status)"
      - name: previous_ingested_ts
        description: "Timestamp of the previous status notification for the same charge point and connector (null for first status)"
      - name: next_status
        description: "Next status for the same charge point and connector (null for last status)"
      - name: next_ingested_ts
        description: "Timestamp of the next status notification for the same charge point and connector (null for last status)"
      - name: confirmation_ingested_ts
        description: "Timestamp when the confirmation was ingested"
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - charger_id
              - connector_id
              - ingested_ts
      - dbt_utils.expression_is_true:
          arguments:
            expression: "status != previous_status or previous_status is null"
          config:
            severity: error
      - dbt_utils.expression_is_true:
          arguments:
            expression: "status != next_status or next_status is null"
          config:
            severity: error

  - name: int_connector_preparing
    description: "Intermediate model that processes charge attempt events, anchoring on charger going into 'Preparing' state and aggregating related authentication data. Each row represents a unique status change to 'Preparing'."
    columns:
      - name: charger_id
        description: "Identifier for the charge point"
        data_tests:
          - not_null
      - name: connector_id
        description: "Identifier for the charging connector"
        data_tests:
          - not_null
      - name: unique_id
        description: "Unique identifier for the status change that triggered this charge attempt"
        data_tests:
          - not_null
      - name: ingested_ts
        description: "Timestamp when the StatusNotification with status 'Preparing' was ingested (start of charge attempt)"
        data_tests:
          - not_null
      - name: previous_status
        description: "Status before changing to 'Preparing'"
      - name: status
        description: "Current status (should be 'Preparing')"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Preparing']
      - name: next_status
        description: "Next status after 'Preparing' (e.g., 'Charging', 'Available', 'Faulted')"
      - name: confirmation_ingested_ts
        description: "Timestamp when the status change confirmation was received"
      - name: id_tags
        description: "Array of driver identifiers (id_tag) from Authorize/StartTransaction messages"
      - name: id_tag_statuses
        description: "Array of authorization statuses (e.g., 'Accepted', 'Blocked')"
      - name: transaction_id
        description: "Primary transaction ID for this charge attempt (first element from transaction_ids array)"
      - name: error_codes
        description: "Array of error codes from StatusNotification messages"
      - name: _unique_transaction_count
        description: "Count of unique transaction IDs for this charge attempt (should be 0 or 1)"
        data_tests:
          - accepted_values:
              arguments:
                values: [0, 1]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - charger_id
              - connector_id
              - ingested_ts

  - name: int_transactions
    description: "Intermediate model that processes transaction-related OCPP events (StartTransaction, StopTransaction, RemoteStartTransaction, RemoteStopTransaction, MeterValues) and groups them by transaction ID. Each row represents a unique transaction with aggregated details. Grain: one row per charger_id + connector_id + ingested_ts."
    columns:
      - name: transaction_id
        description: "Unique identifier for the transaction from OCPP StartTransaction/StopTransaction messages"
        data_tests:
          - not_null
      - name: charger_id
        description: "Identifier for the charge point"
        data_tests:
          - not_null
      - name: connector_id
        description: "Connector ID for this transaction"
        data_tests:
          - not_null
      - name: ingested_ts
        description: "Earliest timestamp when any OCPP event for this transaction was ingested"
        data_tests:
          - not_null
      - name: transaction_start_ts
        description: "Timestamp when the transaction started (from StartTransaction message)"
        data_tests:
          - not_null
      - name: transaction_stop_ts
        description: "Timestamp when the transaction stopped (from StopTransaction message)"
      - name: transaction_stop_reason
        description: "Reason for stopping the transaction (e.g., 'EVDisconnected', 'DeAuthorized', 'Local')"
      - name: id_tags
        description: "Array of driver identifiers (id_tag) from Authorize/StartTransaction messages"
      - name: id_tag_statuses
        description: "Array of authorization statuses (e.g., 'Accepted', 'Blocked', 'Expired')"
      - name: meter_start_wh
        description: "Meter reading at transaction start (Wh)"
      - name: meter_stop_wh
        description: "Meter reading at transaction stop (Wh)"
      - name: energy_transferred_kwh
        description: "Total energy transferred in kWh (calculated from meter_stop_kw - meter_start_kw)"
      - name: error_codes
        description: "Array of error codes from StatusNotification events that occurred during the transaction"
      - name: _unique_connectors_count
        data_tests:
          - accepted_values:
              arguments:
                values: [1]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - charger_id
              - connector_id
              - ingested_ts

  - name: int_driver_aggregates
    description: "Incremental per-driver aggregation over fact_charge_attempts. Maintains running first/last timestamps and authorization statuses per id_tag. Also tracks unauthorized attempts ('__UNKNOWN__' id_tag) under the sentinel row in dim_drivers downstream."
    columns:
      - name: id_tag
        description: "Driver identifier (id_tag) observed in OCPP messages. Natural key; null rows (unauthorized attempts) are excluded."
        data_tests:
          - not_null
          - unique
      - name: first_seen_ts
        description: "Earliest charge_attempt_start_ts for this driver. Updated via least() on each incremental merge to handle late-arriving events."
        data_tests:
          - not_null
      - name: last_seen_ts
        description: "Most recent charge_attempt_start_ts for this driver. Updated via greatest() on each incremental merge."
        data_tests:
          - not_null
      - name: first_authorization_status
        description: "Authorization status at the driver's earliest charge attempt. Follows first_seen_ts: updated when a new batch contains an earlier event."
        data_tests:
          - accepted_values:
              arguments:
                values: ['Accepted', 'Blocked', 'Expired', 'Invalid', 'ConcurrentTx']
      - name: latest_authorization_status
        description: "Authorization status at the driver's most recent charge attempt. Follows last_seen_ts: updated when a new batch contains a later event."
        data_tests:
          - accepted_values:
              arguments:
                values: ['Accepted', 'Blocked', 'Expired', 'Invalid', 'ConcurrentTx']
      - name: incremental_ts
        description: "Largest incremental_ts from fact_charge_attempts processed into this row. Serves as the watermark for the next incremental run."
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "last_seen_ts >= first_seen_ts"
          config:
            severity: error


  - name: int_meter_values
    description: "Intermediate incremental model that processes transaction-level aggregated meter values. Provides min, max, and average values for each measurand aggregated across the entire transaction. Use for transaction-level analysis."
    columns:
      - name: charger_id
        description: "Unique identifier for the charging point"
        data_tests:
          - not_null
      - name: transaction_id
        description: "Unique identifier for the charging transaction"
        data_tests:
          - not_null
      - name: connector_id
        description: "Unique identifier for the connector within the charging point"
        data_tests:
          - not_null
      - name: ingested_ts
        description: "Timestamp when transaction was ingested into the system"
        data_tests:
          - not_null
      - name: measurand
        description: "Type of measurement (e.g., Energy.Active.Import.Register, Voltage, Current.Import)"
        data_tests:
          - not_null
      - name: unit
        description: "Unit of measurement (e.g., Wh, V, A, W)"
        data_tests:
          - not_null
      - name: phase
        description: "Electrical phase (e.g., L1, L2, L3) or null for single-phase measurements"
      - name: first_measurement_ts
        description: "Meter timestamp of the first measurement for the transaction"
        data_tests:
          - not_null
      - name: last_measurement_ts
        description: "Meter timestamp of the last measurement for the transaction"
        data_tests:
          - not_null
      - name: min_value
        description: "Minimum value recorded for the transaction"
        data_tests:
          - not_null
      - name: max_value
        description: "Maximum value recorded for the transaction"
        data_tests:
          - not_null
      - name: avg_value
        description: "Average value for the transaction"
        data_tests:
          - not_null
      - name: _count
        description: "Total number of measurements for the transaction"
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - charger_id
              - connector_id
              - transaction_id
              - ingested_ts
              - measurand
              - unit
              - phase
      - dbt_utils.expression_is_true:
          arguments:
            expression: "min_value <= avg_value and avg_value <= max_value"
          config:
            severity: error

  - name: int_chargers
    description: "Materialized charger reference table with port count. Breaks the live RAW catalog dependency for downstream models. Grain: one row per charger_id."
    columns:
      - name: charger_id
        description: "Charger identifier."
        data_tests:
          - not_null
          - unique
      - name: location_id
        description: "Location identifier where the Charger is installed."
        data_tests:
          - not_null
      - name: commissioned_ts
        description: "Timestamp when the Charger was commissioned (null if not yet commissioned)."
      - name: decommissioned_ts
        description: "Timestamp when the Charger was decommissioned (null if still commissioned)."
      - name: port_count
        description: "Number of Ports on this Charger."
        data_tests:
          - not_null

  - name: int_ports
    description: "Materialized port reference table with connector count. Breaks the live RAW catalog dependency for downstream models. Grain: one row per charger_id + port_id."
    columns:
      - name: charger_id
        description: "Charger identifier."
        data_tests:
          - not_null
      - name: port_id
        description: "Port identifier within the Charger."
        data_tests:
          - not_null
      - name: connector_count
        description: "Number of Connectors on this Port."
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
      - name: max_power_kw
        description: "Maximum rated output power of the Port in kilowatts."
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - charger_id
              - port_id

  - name: int_connectors
    description: "Materialized connector reference table. Breaks the live RAW catalog dependency for downstream models. Grain: one row per charger_id + port_id + connector_id."
    columns:
      - name: charger_id
        description: "Charger identifier."
        data_tests:
          - not_null
      - name: port_id
        description: "Port identifier within the Charger."
        data_tests:
          - not_null
      - name: connector_id
        description: "Connector identifier within the Port."
        data_tests:
          - not_null
      - name: connector_type
        description: "Type of connector (e.g., CCS, NACS, CHAdeMO)."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['CCS', 'CHAdeMO', 'NACS', 'Type 2', 'Type 1']
      - name: max_power_kw
        description: "Maximum rated output power of the Connector in kilowatts."
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - charger_id
              - port_id
              - connector_id
