version: 2

semantic_models:
  - name: chargers
    description: "Charger dimension. Use to slice metrics by charger lifecycle attributes such as is_commissioned and location."
    model: ref('dim_chargers')
    entities:
      - name: charger
        type: primary
        expr: charger_id
    dimensions:
      - name: is_commissioned
        type: categorical
        description: "True if the charger has not been decommissioned."
      - name: location_id
        type: categorical

  - name: ports
    description: "Port dimension. Use to slice uptime and downtime metrics by port."
    model: ref('dim_ports')
    entities:
      - name: port
        type: primary
        expr: port_key
    dimensions:
      - name: charger_id
        type: categorical
      - name: location_id
        type: categorical

  - name: connectors
    description: "Connector dimension. Use to slice metrics by connector type or current status."
    model: ref('dim_connectors')
    entities:
      - name: connector
        type: primary
        expr: connector_key
    dimensions:
      - name: connector_type
        type: categorical
      - name: latest_status
        type: categorical
      - name: charger_id
        type: categorical
      - name: location_id
        type: categorical

  - name: visits
    description: "Visit-level semantic model for driver visit outcomes, attempt counts, duration, and energy transferred."
    model: ref('fact_visits')
    defaults:
      agg_time_dimension: visit_end_ts
    entities:
      - name: visit
        type: primary
        expr: visit_id
      - name: charge_attempt
        type: foreign
        expr: last_charge_attempt_id
      - name: driver
        type: foreign
        expr: driver_key
      - name: location
        type: foreign
        expr: location_key
      - name: port
        type: foreign
        expr: last_port_key
    dimensions:
      - name: visit_end_ts
        type: time
        type_params:
          time_granularity: day
      - name: visit_start_ts
        type: time
        type_params:
          time_granularity: day
      - name: first_charger_id
        type: categorical
      - name: last_charger_id
        type: categorical
      - name: is_first_attempt_success
        type: categorical
        description: "True when the visit was successful with only one attempt."
        expr: case when is_successful and charge_attempt_count = 1 then true else false end
      - name: is_troubled_success
        type: categorical
        description: "True when the visit succeeded but required more than one attempt."
        expr: case when is_successful and charge_attempt_count > 1 then true else false end
      - name: is_successful
        type: categorical
        description: "True when the visit ended in a successful charge."
      - name: is_failed
        type: categorical
        description: "True when the visit did not end in a successful charge."
        expr: case when is_successful then false else true end
    measures:
      - name: visits_count
        description: "Total number of visits."
        agg: count
        expr: visit_id
      - name: energy_per_visit_kwh_average
        description: "Average energy transferred per visit in kWh."
        agg: average
        expr: total_energy_transferred_kwh
      - name: charge_attempts_count
        description: "Total number of charge attempts across all visits."
        agg: sum
        expr: charge_attempt_count
      - name: successful_visits_count
        description: "Number of successful visits."
        agg: count
        expr: case when is_successful then visit_id end
      - name: visit_success_count
        description: "Boolean count of successful visits for rate calculations."
        agg: sum_boolean
        expr: is_successful
      - name: visit_duration_minutes_average
        description: "Average duration of visits in minutes."
        agg: average
        expr: visit_duration_minutes
      - name: troubled_success_visits_count
        description: "Number of visits that had multiple attempts but ultimately succeeded (troubled success)."
        agg: count
        expr: case when is_successful and charge_attempt_count > 1 then visit_id end
      - name: troubled_success_count
        description: "Boolean count of troubled-success visits for rate calculations."
        agg: sum_boolean
        expr: case when is_successful and charge_attempt_count > 1 then true else false end
      - name: charge_attempt_success_count
        description: "Boolean count of successful visits for rate calculations."
        agg: sum_boolean
        expr: is_successful
      - name: first_attempt_success_visits_count
        description: "Number of visits where the first attempt was successful."
        agg: count
        expr: case when is_successful and charge_attempt_count = 1 then visit_id end
      - name: first_attempt_success_count
        description: "Boolean count of first-attempt-success visits for rate calculations."
        agg: sum_boolean
        expr: case when is_successful and charge_attempt_count = 1 then true else false end
      - name: troubled_first_attempt_visits_count
        description: "Number of visits that succeeded overall but required multiple attempts."
        agg: count
        expr: case when is_successful and charge_attempt_count > 1 then visit_id end
      - name: failed_visits_count
        description: "Number of visits that failed (did not end in successful charge)."
        agg: count
        expr: case when is_successful then null else visit_id end

  - name: charge_attempts
    description: "Semantic model for analyzing individual charge attempts and success metrics."
    model: ref('fact_charge_attempts')
    defaults:
      agg_time_dimension: charge_attempt_start_ts
    entities:
      - name: charge_attempt
        type: primary
        expr: charge_attempt_id
      - name: charger
        type: foreign
        expr: charger_id
      - name: port
        type: foreign
        expr: port_key
      - name: location
        type: foreign
        expr: location_key
    dimensions:
      - name: charge_attempt_start_ts
        type: time
        type_params:
          time_granularity: day
      - name: charge_attempt_stop_ts
        type: time
        type_params:
          time_granularity: day
      - name: is_successful
        type: categorical
        description: "True when there is a transaction, the attempt does not end faulted, the stop reason is valid, and energy transferred exceeds 0.1 kWh."
        expr: case when transaction_id is not null and (next_status is null or next_status != 'Faulted') and transaction_stop_reason in ('Local', 'Remote', 'EVDisconnected') and energy_transferred_kwh is not null and energy_transferred_kwh > 0.1 then true else false end
      - name: next_status
        type: categorical
      - name: transaction_stop_reason
        type: categorical
      - name: charger_id
        type: categorical
      - name: connector_id
        type: categorical
      - name: status
        type: categorical
    measures:
      - name: attempts_count
        description: "Total number of charge attempts."
        agg: count
        expr: charge_attempt_id
      - name: successful_attempts_count
        description: "Number of successful charge attempts."
        agg: count
        expr: case when is_successful then charge_attempt_id end
      - name: attempt_success_rate
        description: "Boolean count of successful attempts for rate calculations."
        agg: sum_boolean
        expr: is_successful
      - name: energy_transferred_kwh_sum
        description: "Total energy transferred across all charge attempts in kWh."
        agg: sum
        expr: energy_transferred_kwh
      - name: average_energy_per_attempt_kwh
        description: "Average energy transferred per charge attempt in kWh."
        agg: average
        expr: energy_transferred_kwh
      - name: average_energy_per_successful_attempt
        description: "Average energy transferred per successful charge attempt in kWh."
        agg: average
        expr: case when is_successful then energy_transferred_kwh end
      - name: failed_attempts_count
        description: "Number of failed charge attempts."
        agg: count
        expr: case when is_successful then null else charge_attempt_id end
      - name: attempts_with_transaction_count
        description: "Number of attempts that had an associated transaction."
        agg: count
        expr: case when transaction_id is not null then charge_attempt_id end
      - name: transaction_success_rate
        description: "Average success rate among attempts that had transactions."
        agg: average
        expr: case when transaction_id is not null then cast(is_successful as integer) else null end

  - name: drivers
    description: "Driver dimension. One row per RFID id_tag observed in OCPP charge attempts, plus an UNKNOWN sentinel for unauthorized visits."
    model: ref('dim_drivers')
    defaults:
      agg_time_dimension: first_seen_ts
    entities:
      - name: driver
        type: primary
        expr: driver_key
    dimensions:
      - name: id_tag
        type: categorical
      - name: is_known_driver
        type: categorical
      - name: first_authorization_status
        type: categorical
      - name: latest_authorization_status
        type: categorical
      - name: first_seen_ts
        type: time
        type_params:
          time_granularity: day
      - name: last_seen_ts
        type: time
        type_params:
          time_granularity: day
    measures:
      - name: drivers_count
        description: "Total number of distinct drivers, including the UNKNOWN sentinel."
        agg: count
        expr: driver_key
      - name: known_drivers_count
        description: "Number of drivers with a real id_tag, excluding the UNKNOWN sentinel."
        agg: sum_boolean
        expr: is_known_driver

  - name: uptime
    description: "Port-level daily uptime: fraction of commissioned minutes not lost to outages."
    model: ref('fact_uptime')
    defaults:
      agg_time_dimension: date_id
    entities:
      - name: uptime_record
        type: primary
        expr: uptime_id
      - name: charger
        type: foreign
        expr: charger_id
      - name: port
        type: foreign
        expr: port_key
      - name: location
        type: foreign
        expr: location_key
    dimensions:
      - name: date_id
        type: time
        type_params:
          time_granularity: day
      - name: charger_id
        type: categorical
      - name: port_id
        type: categorical
    measures:
      - name: uptime_average
        description: "Average uptime as the fraction of commissioned time that was up."
        agg: average
        expr: uptime

  - name: locations
    description: "Location dimension. One row per distinct location observed in port data."
    model: ref('dim_locations')
    entities:
      - name: location
        type: primary
        expr: location_key
    dimensions:
      - name: location_id
        type: categorical

metrics:
  - name: total_visits
    description: "Total number of visits."
    label: "Visits count"
    type: simple
    type_params:
      measure: visits_count

  - name: total_charge_attempts
    description: "Total number of charge attempts across all visits."
    label: "Total charge attempts"
    type: simple
    type_params:
      measure: charge_attempts_count

  - name: average_attempts_per_visit
    description: "Average number of charge attempts per visit."
    label: "Average attempts per visit"
    type: ratio
    type_params:
      numerator: total_charge_attempts
      denominator: total_visits

  - name: first_attempt_success
    description: "Count of visits where the first attempt succeeded."
    label: "First attempt success count"
    type: simple
    type_params:
      measure: first_attempt_success_count

  - name: troubled_success
    description: "Count of visits that were troubled successes."
    label: "Troubled success count"
    type: simple
    type_params:
      measure: troubled_success_count

  - name: failed_visits
    description: "Count of visits that failed."
    label: "Failed visits count"
    type: simple
    type_params:
      measure: failed_visits_count

  - name: first_attempt_success_rate
    description: "Primary reliability metric. Proportion of visits where the first attempt succeeded."
    label: "First attempt success rate"
    type: ratio
    type_params:
      numerator: first_attempt_success
      denominator: total_visits

  - name: troubled_success_rate
    description: "Primary reliability metric. Proportion of visits that were troubled successes."
    label: "Troubled success rate"
    type: ratio
    type_params:
      numerator: troubled_success
      denominator: total_visits

  - name: failed_rate
    description: "Primary reliability metric. Proportion of visits that failed."
    label: "Failed rate"
    type: ratio
    type_params:
      numerator: failed_visits
      denominator: total_visits

  - name: average_uptime
    description: "Primary reliability metric. Average port uptime as the fraction of commissioned time that was up, not in outage."
    label: "Average uptime"
    type: simple
    type_params:
      measure: uptime_average
