version: 2

semantic_models:
  - name: visits
    description: ""
    model: ref('fact_visits')
    defaults:
      agg_time_dimension: visit_end_ts
    entities:
      - name: visit
        type: primary
        expr: visit_id
      - name: charge_attempt
        type: foreign
        expr: last_charge_attempt_id
    dimensions:
      - name: visit_end_ts
        type: time
        type_params:
          time_granularity: day
      - name: visit_start_ts
        type: time
        type_params:
          time_granularity: day
      - name: first_charge_point_id
        type: categorical
      - name: last_charge_point_id
        type: categorical
      - name: is_first_attempt_success
        type: categorical
        description: "True when the visit was successful with only one attempt"
        expr: CASE WHEN is_successful and charge_attempt_count = 1 THEN True ELSE False END
      - name: is_troubled_success
        type: categorical
        description: "True when the visit succeeded but required more than one attempt"
        expr: CASE WHEN is_successful and charge_attempt_count > 1 THEN True ELSE False END
      - name: is_successful
        type: categorical
        description: True when last charge attempt was successful"
      - name: is_failed
        type: categorical
        description: "True when the visit did not end in a successful charge"
        expr: not is_successful
    measures:
      - name: visits_count
        description: "Total number of charging visits"
        agg: count
        expr: visit_id
      - name: energy_per_visit_kwh_average
        description: "Average energy transferred per visit (kWh)"
        agg: average
        expr: total_energy_transferred_kwh
      - name: charge_attempts_count
        description: "Total number of charge attempts across all visits"
        agg: sum
        expr: charge_attempt_count
      - name: successful_visits_count
        description: "Number of successful visits"
        agg: count
        expr: case when is_successful then visit_id end
      - name: visit_success_count
        description: "Percentage of visits that were successful"
        agg: sum_boolean
        expr: is_successful
      - name: visit_duration_minutes_average
        description: "Average duration of visits in minutes"
        agg: average
        expr: visit_duration_minutes
      - name: troubled_success_visits_count
        description: "Number of visits that had multiple attempts but ultimately succeeded (troubled success)"
        agg: count
        expr: case when is_successful and charge_attempt_count > 1 then visit_id end
      - name: troubled_success_count
        description: "Percentage of successful visits that required multiple attempts"
        agg: sum_boolean
        expr: case when is_successful and charge_attempt_count > 1 then True else False end
      - name: charge_attempt_success_count
        description: "Percentage of successful visits"
        agg: sum_boolean
        expr: is_successful
      - name: first_attempt_success_visits_count
        description: "Number of visits where the first attempt was successful"
        agg: count
        expr: case when is_successful and charge_attempt_count = 1 then visit_id end
      - name: first_attempt_success_count
        description: "Percentage of visits where the first attempt succeeded"
        agg: sum_boolean
        expr: case when is_successful and charge_attempt_count = 1 then true else false end
      - name: troubled_first_attempt_visits_count
        description: "Visits that succeeded overall but failed on first attempt (needed multiple tries)"
        agg: count
        expr: case when is_successful and charge_attempt_count > 1 then visit_id end
      - name: failed_visits_count
        description: "Number of visits that failed (did not end in successful charge)"
        agg: count
        expr: case when not is_successful then visit_id end

  - name: charge_attempts
    description: "Semantic model for analyzing individual charge attempts and success metrics"
    model: ref('fact_charge_attempts')
    defaults:
      agg_time_dimension: charge_attempt_start_ts
    entities:
      - name: charge_attempt
        type: primary
        expr: charge_attempt_id
    dimensions:
      - name: charge_attempt_start_ts
        type: time
        type_params:
          time_granularity: day
      - name: charge_attempt_stop_ts
        type: time
        type_params:
          time_granularity: day
      - name: is_successful
        type: categorical
        description: "True when there is a transaction, next status is not Faulted, stop reason is Local/Remote/EVDisconnected, and energy > 0.1 kWh"
        expr: "transaction_id is not null and (next_status is null or next_status != 'Faulted') and transaction_stop_reason in ('Local', 'Remote', 'EVDisconnected') and energy_transferred_kwh is not null and energy_transferred_kwh > 0.1"
      - name: next_status
        type: categorical
      - name: transaction_stop_reason
        type: categorical
      - name: charge_point_id
        type: categorical
      - name: connector_id
        type: categorical
      - name: status
        type: categorical
    measures:
      - name: attempts_count
        description: "Total number of charge attempts"
        agg: count
        expr: charge_attempt_id
      - name: successful_attempts_count
        description: "Number of successful charge attempts (transaction exists, not faulted, valid stop reason, >0.1 kWh)"
        agg: count
        expr: case when is_successful then charge_attempt_id end
      - name: attempt_success_rate
        description: "Percentage of charge attempts that were successful"
        agg: sum_boolean
        expr: is_successful
      - name: energy_transferred_kwh_sum
        description: "Total energy transferred across all charge attempts (kWh)"
        agg: sum
        expr: energy_transferred_kwh
      - name: average_energy_per_attempt_kwh
        description: "Average energy transferred per charge attempt (kWh)"
        agg: average
        expr: energy_transferred_kwh
      - name: average_energy_per_successful_attempt
        description: "Average energy transferred per successful charge attempt (kWh)"
        agg: average
        expr: case when is_successful then energy_transferred_kwh end
      - name: failed_attempts_count
        description: "Number of failed charge attempts"
        agg: count
        expr: case when not is_successful then charge_attempt_id end
      - name: attempts_with_transaction_count
        description: "Number of attempts that had an associated transaction"
        agg: count
        expr: case when transaction_id is not null then charge_attempt_id end
      - name: transaction_success_rate
        description: "Percentage of attempts with transactions that were successful"
        agg: average
        expr: case when transaction_id is not null then cast(is_successful as integer) else null end

  - name: uptime
    description: "Port-level daily uptime: fraction of commissioned minutes not lost to outages"
    model: ref('fact_uptime')
    defaults:
      agg_time_dimension: date_id
    entities:
      - name: uptime_record
        type: primary
        expr: uptime_id
    dimensions:
      - name: date_id
        type: time
        type_params:
          time_granularity: day
      - name: charge_point_id
        type: categorical
      - name: port_id
        type: categorical
    measures:
      - name: uptime_average
        description: "Average uptime (fraction of commissioned time that was up)"
        agg: average
        expr: uptime

metrics:
  - name: total_visits
    description: "Total number of charging visits"
    label: "Visits count"
    type: simple
    type_params:
      measure: visits_count
  - name: total_charge_attempts
    description: "Total number of charge attempts across all visits"
    label: "Total charge attempts"
    type: simple
    type_params:
      measure: charge_attempts_count
  - name: average_attempts_per_visit
    description: "Average number of charge attempts per visit (total charge attempts / total visits)"
    label: "Average attempts per visit"
    type: ratio
    type_params:
      numerator: total_charge_attempts
      denominator: total_visits
  - name: first_attempt_success
    description: "Count of visits where the first attempt succeeded"
    label: "First attempt success count"
    type: simple
    type_params:
      measure: first_attempt_success_count
  - name: troubled_success
    description: "Count of visits that were troubled success (succeeded with multiple attempts)"
    label: "Troubled success count"
    type: simple
    type_params:
      measure: troubled_success_count
  - name: failed_visits
    description: "Count of visits that failed"
    label: "Failed visits count"
    type: simple
    type_params:
      measure: failed_visits_count
  - name: first_attempt_success_rate
    description: "Proportion of visits where the first attempt succeeded"
    label: "First attempt success rate"
    type: ratio
    type_params:
      numerator: first_attempt_success
      denominator: total_visits
  - name: troubled_success_rate
    description: "Proportion of visits that were troubled success (succeeded with multiple attempts)"
    label: "Troubled success rate"
    type: ratio
    type_params:
      numerator: troubled_success
      denominator: total_visits
  - name: failed_rate
    description: "Proportion of visits that failed"
    label: "Failed rate"
    type: ratio
    type_params:
      numerator: failed_visits
      denominator: total_visits
  - name: uptime
    description: "Average port uptime (fraction of commissioned time that was up, not in outage)"
    label: "Average uptime"
    type: simple
    type_params:
      measure: uptime_average
