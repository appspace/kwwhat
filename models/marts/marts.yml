version: 2

models:
  - name: fact_charge_attempts
    description: "Incremental marts model that combines charge attempts and transactions data using outer join. Provides comprehensive view of charge attempts with associated transaction details where available."
    columns:
      - name: charger_id
        description: "Identifier for the charger"
        data_tests:
          - not_null
      - name: connector_id
        description: "Identifier for the charging connector"
        data_tests:
          - not_null
      - name: charge_attempt_id
        description: "Surrogate key for the charge attempt, generated from charger_id, connector_id, and charge_attempt_start_ts."
        data_tests:
          - unique
          - not_null
      - name: charge_attempt_start_ts
        description: "Start timestamp of the charge attempt. Uses preparing_start_ts (coalesce of payload_ts and ingested_ts from StatusNotification) if available, otherwise transaction_start_ts."
        data_tests:
          - not_null
      - name: charge_attempt_stop_ts
        description: "Stop timestamp of the charge attempt. Uses transaction_stop_ts if transaction exists, otherwise preparing_stop_ts (coalesce of next_payload_ts and next_ingested_ts)."
      - name: preparing_unique_id
        description: "Unique identifier of the Status Notification OCPP message"
      - name: preparing_ingested_ts
        description: "Timestamp when the StatusNotification with status 'Preparing' was ingested"
      - name: preparing_payload_ts
        description: "Optional timestamp from the StatusNotification payload (when status is 'Preparing')"
      - name: preparing_next_payload_ts
        description: "Optional timestamp from the next StatusNotification payload after 'Preparing' status"
      - name: confirmation_ingested_ts
        description: "Timestamp when the status change confirmation was received"
      - name: previous_status
        description: "Status before changing to 'Preparing'"
      - name: status
        description: "Current status (should be 'Preparing')"
        data_tests:
          - accepted_values:
              arguments:
                values: ['Preparing']
      - name: next_status
        description: "Next status after 'Preparing' (e.g., 'Charging', 'Available', 'Faulted')"
      - name: id_tags
        description: "Array of driver identifiers (id_tag) merged from charge attempt and transaction events. See id_tag for the scalar value."
      - name: id_tag_statuses
        description: "Array of authorization statuses merged from charge attempt and transaction events"
      - name: id_tag
        description: "Driver identifier (id_tag) for this attempt — first element from the id_tags array. Null for unauthorized attempts."
      - name: id_tag_status
        description: "Authorization status for the driver identifier (id_tag). Null when id_tag is null."
      - name: transaction_id
        description: "Transaction ID (from charge attempt or transaction data)"
        data_tests:
          - unique
      - name: transaction_ingested_ts
        description: "Earliest timestamp when any OCPP event for this transaction was ingested"
      - name: transaction_start_ts
        description: "Timestamp when the transaction started"
      - name: transaction_stop_ts
        description: "Timestamp when the transaction stopped"
      - name: transaction_stop_reason
        description: "Reason for stopping the transaction"
      - name: meter_start_wh
        description: "Meter reading at transaction start (Wh)"
      - name: meter_stop_wh
        description: "Meter reading at transaction stop (Wh)"
      - name: energy_transferred_kwh
        description: "Total energy transferred in kWh"
      - name: error_codes
        description: "Array of error codes from both charge attempt events and StatusNotification events during the transaction"
      - name: is_successful
        description: "Boolean flag indicating if the charge attempt was successful. True when: there is a transaction, next status is not 'Faulted', transaction stop reason is 'Local', 'Remote' or 'EVDisconnected', and energy transferred is greater than 0.01 kWh."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
      - name: incremental_ts
        description: "Latest incremental processing timestamp from both source models for incremental processing tracking"
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - charger_id
              - connector_id
              - charge_attempt_start_ts
      - dbt_utils.expression_is_true:
          arguments:
            expression: "charge_attempt_stop_ts is null or charge_attempt_stop_ts >= charge_attempt_start_ts"
          config:
            severity: error

  - name: fact_interval_data
    description: "15-minute interval meter values. Provides average values for each measurand within each 15-minute interval. Use for rebates reporting and time-series analysis."
    columns:
      - name: charger_id
        description: "Unique identifier for the charging point"
        data_tests:
          - not_null
      - name: transaction_id
        description: "Unique identifier for the charging transaction"
        data_tests:
          - not_null
      - name: connector_id
        description: "Unique identifier for the connector within the charging point"
        data_tests:
          - not_null
      - name: ingested_ts
        description: "Timestamp when transaction was ingested into the system"
        data_tests:
          - not_null
      - name: measurand
        description: "Type of measurement (e.g., Energy.Active.Import.Register, Voltage, Current.Import)"
        data_tests:
          - not_null
      - name: unit
        description: "Unit of measurement (e.g., Wh, V, A, W)"
        data_tests:
          - not_null
      - name: phase
        description: "Electrical phase (e.g., L1, L2, L3) or null for single-phase measurements"
      - name: meter_15min_interval_start
        description: "Start timestamp of the 15-minute interval. For the first interval, this is the actual first measurement time; for subsequent intervals, it's the 15-minute boundary."
        data_tests:
          - not_null
      - name: meter_15min_interval_stop
        description: "End timestamp of the 15-minute interval. For the last interval, this is the actual last measurement time; for other intervals, it's the next 15-minute boundary."
        data_tests:
          - not_null
      - name: avg_value
        description: "Average value for the measurand within this 15-minute interval"
        data_tests:
          - not_null
      - name: _count
        description: "Number of measurements within this 15-minute interval"
        data_tests:
          - not_null
      - name: interval_data_id
        description: "Surrogate key for the interval data record, generated from charger_id, transaction_id, ingested_ts, connector_id, measurand, unit, phase, and meter_15min_interval_start"
        data_tests:
          - unique
          - not_null
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - charger_id
              - connector_id
              - transaction_id
              - ingested_ts
              - measurand
              - unit
              - phase
              - meter_15min_interval_start

  - name: fact_downtime_daily
    description: "One row per date_id + charger_id + port_id + reason. Daily aggregation of downtime at Port grain, splitting outages across calendar days. Reliability metrics are tracked per Port — the independently operated unit that serves one EV at a time. Currently covers OFFLINE and FAULTED outage types. Both outage sources are inner-joined to dim_ports before reaching this model, so port_id is always populated."
    columns:
      - name: date_id
        description: "Calendar date for the downtime aggregation"
        data_tests:
          - not_null
      - name: charger_id
        description: "Identifier for the charger"
        data_tests:
          - not_null
      - name: port_key
        description: "Foreign key to dim_ports for the affected port."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_ports')
                field: port_key
      - name: port_id
        description: "Port identifier associated with the charger. Always populated: both the OFFLINE and FAULTED outage sources are inner-joined to dim_ports before reaching this model."
        data_tests:
          - not_null
      - name: duration_minutes
        description: "Total downtime minutes for the date/charger/port combination"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: reason
        description: "Downtime reason: FAULTED or OFFLINE."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['OFFLINE', 'FAULTED']
      - name: downtime_id
        description: "Surrogate key for the downtime record, generated from date_id, charger_id, port_id, and reason"
        data_tests:
          - unique
          - not_null
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - date_id
              - charger_id
              - port_id
              - reason

  - name: fact_visits
    description: "One row per driver visit — a single trip to a charging location that may span multiple charge attempts (e.g., a failed plug-in followed by a retry). Authenticated visits (idTag present) group attempts by driver + location within a 30-minute window; unauthenticated visits group by port within a 2-minute window. Implementation uses two-step grouping: Step 1 groups attempts by charger_id within 2 minutes, inferring idTag from any attempt in the group that has one. Step 2 groups by location_id + idTag within 30 minutes (authenticated) or by charger_id + port_id within 2 minutes (unauthenticated). Time gaps are measured from charge_attempt_stop_ts of one attempt to charge_attempt_start_ts of the next."
    columns:
      - name: visit_id
        description: "Unique identifier for the visit, generated from location_id, first_charger_id, and visit_start_ts"
        data_tests:
          - not_null
          - unique
      - name: location_key
        description: "Foreign key to dim_locations."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_locations')
                field: location_key
      - name: location_id
        description: "Location identifier where the visit occurred"
        data_tests:
          - not_null
      - name: id_tag
        description: "Driver identifier (id_tag) for this visit. Null for unauthorized visits. May be inferred from a subsequent authorized attempt within 2 minutes on the same charger."
      - name: driver_key
        description: "Foreign key to dim_drivers. Computed as dbt_utils.generate_surrogate_key(coalesce(id_tag, 'UNKNOWN')) so unauthorized visits resolve to the UNKNOWN sentinel."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_drivers')
                field: driver_key
              config:
                severity: warn

      - name: visit_start_ts
        description: "Start timestamp of the first charge attempt in the visit (charge_attempt_start_ts)"
        data_tests:
          - not_null
      - name: visit_end_ts
        description: "Stop timestamp of the last charge attempt in the visit (charge_attempt_stop_ts)"
        data_tests:
          - not_null
      - name: charge_attempt_count
        description: "Number of charge attempts in this visit"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
      - name: charger_ids
        description: "Array of charger IDs used during this visit"
      - name: charge_attempt_ids
        description: "Array of charge attempt IDs included in this visit"
      - name: first_charge_attempt_id
        description: "Charge attempt ID that started the visit"
      - name: last_charge_attempt_id
        description: "Charge attempt ID that ended the visit"
      - name: first_port_id
        description: "Port ID where the visit started"
      - name: last_port_id
        description: "Port ID where the visit ended"
      - name: total_energy_transferred_kwh
        description: "Total energy transferred across all charge attempts in this visit (kWh)"
      - name: visit_duration_minutes
        description: "Duration of the visit in minutes (from first charge_attempt_start_ts to last charge_attempt_stop_ts)"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: first_charger_id
        description: "Charger ID where the visit started"
      - name: last_charger_id
        description: "Charger ID where the visit ended"
      - name: is_successful
        description: "Success status of the last charge attempt in the visit"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
      - name: incremental_ts
        description: "Latest incremental processing timestamp for incremental processing tracking"
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - location_id
              - first_charger_id
              - first_port_id
              - visit_start_ts
      - dbt_utils.expression_is_true:
          arguments:
            expression: "visit_end_ts >= visit_start_ts"
          config:
            severity: error

  - name: dim_dates
    description: "Date dimension table for semantic models and date-based joins. Used as MetricFlow time spine."
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        description: "Date at day granularity; used as time spine standard granularity column"
        granularity: day
  
  - name: dim_chargers
    description: >
      Charger (Charging Station) dimension. One row per Charger.
      A Charger is the physical system a driver perceives as a single charger — it has one or more Ports.
      Use for charger inventory, offline outage attribution, and visit attribution at charger level.
      Sanity check: if a driver says "I went to charger #3", they mean this entity.
    columns:
      - name: charger_key
        description: "Surrogate key for the Charger, generated from charger_id."
        data_tests:
          - not_null
          - unique
      - name: charger_id
        description: "Natural key. Unique identifier for the Charger (Charging Station)."
        data_tests:
          - not_null
          - unique
      - name: location_id
        description: "Location where this charger is installed."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_locations')
                field: location_id
      - name: commissioned_ts
        description: "Timestamp when the charger was commissioned."
        data_tests:
          - not_null
      - name: decommissioned_ts
        description: "Timestamp when the charger was decommissioned. Null if still commissioned."
      - name: is_commissioned
        description: "True if the charger has not been decommissioned."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
      - name: port_count
        description: "Number of ports on this charger."
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1

  - name: dim_ports
    description: >
      Port (EVSE) dimension. One row per Port (charger_id + port_id).
      A Port is an independently operated part of a Charger that can deliver energy to one EV at a time.
      Reliability and utilisation metrics (uptime, downtime, charge attempts) are tracked at Port grain.
      Sanity check: the number of Ports at a location answers "how many vehicles can charge simultaneously?".
    columns:
      - name: port_key
        description: "Surrogate key for the Port, generated from charger_id and port_id."
        data_tests:
          - not_null
          - unique
      - name: charger_id
        description: "Charger (Charging Station) this Port belongs to."
        data_tests:
          - not_null
      - name: port_id
        description: "Port (EVSE) identifier within the Charger."
        data_tests:
          - not_null
      - name: connector_count
        description: "Number of connectors on this port."
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - charger_id
              - port_id

  - name: dim_connectors
    description: >
      Connector dimension. One row per Connector (charger_id + port_id + connector_id). Finest-grain hardware dimension.
      A Connector is an independently operated electrical outlet on a Port. A Port may have multiple Connectors
      (different socket types or tethered cables) to support different vehicle types (e.g. four-wheeled EVs and electric scooters).
      Sanity check: the Connector type answers "what vehicle types can charge here?".
      Use for connector-type analysis, current inventory, and connector-specific operational reporting.
    columns:
      - name: connector_key
        description: "Surrogate key for the connector, generated from charger_id, port_id, and connector_id."
        data_tests:
          - not_null
          - unique
      - name: charger_id
        description: "Charger this connector belongs to."
        data_tests:
          - not_null
      - name: port_id
        description: "Port this connector belongs to."
        data_tests:
          - not_null
      - name: connector_id
        description: "Connector identifier within the port."
        data_tests:
          - not_null
      - name: connector_type
        description: "Plug standard for this connector (e.g. CCS, NACS)."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['CCS', 'NACS', 'CHAdeMO', 'Type1', 'Type2']
      - name: latest_status
        description: "Most recent OCPP status reported by this connector. Null if no StatusNotification has been received yet."
        data_tests:
          - accepted_values:
              arguments:
                values: ['Available', 'Preparing', 'Charging', 'SuspendedEVSE', 'SuspendedEV', 'Finishing', 'Reserved', 'Unavailable', 'Faulted']
      - name: latest_error_code
        description: "Error code from the most recent StatusNotification (e.g. NoError, ConnectorLockFailure)."
      - name: latest_status_ts
        description: "Timestamp when the most recent status was ingested."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - charger_id
              - port_id
              - connector_id

  - name: dim_drivers
    description: "Driver dimension. Grain: one row per distinct RFID id_tag observed in OCPP charge attempts, plus a single UNKNOWN sentinel row for unauthorized visits. Reads from int_driver_aggregates (never scans fact_charge_attempts directly). Type 1 (overwrite on each refresh). Behavioral attributes (first/last seen, authorization status) are derived; lifetime metrics belong in the semantic layer, not on this dim."
    columns:
      - name: driver_key
        description: "Surrogate key for the driver dimension. Deterministic hash of id_tag. The UNKNOWN sentinel uses a stable hash of the literal 'UNKNOWN'."
        tests:
          - not_null
          - unique
      - name: id_tag
        description: "Natural key. Driver identifier (id_tag) observed in OCPP messages, or the literal 'UNKNOWN' for the sentinel row aggregating all unauthorized visits."
        tests:
          - not_null
          - unique
      - name: is_known_driver
        description: "True for real drivers (id_tag observed in logs). False only for the UNKNOWN sentinel row."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
      - name: first_seen_ts
        description: "Earliest charge_attempt_start_ts associated with this driver. For the UNKNOWN sentinel: the earliest unauthorized attempt, or '1900-01-01' if none exist yet."
        tests:
          - not_null
      - name: last_seen_ts
        description: "Most recent charge_attempt_start_ts associated with this driver. For the UNKNOWN sentinel: the most recent unauthorized attempt, or '1900-01-01' if none exist yet."
        tests:
          - not_null
      - name: first_authorization_status
        description: "Authorization status reported for this driver's earliest charge attempt (from id_tag_statuses array). Null for the UNKNOWN sentinel (no id_tag observed)."
        tests:
          - accepted_values:
              arguments:
                values: ['Accepted', 'Blocked', 'Expired', 'Invalid', 'ConcurrentTx']
      - name: latest_authorization_status
        description: "Authorization status reported for this driver's most recent charge attempt (from id_tag_statuses array). Null for the UNKNOWN sentinel (no id_tag observed)."
        tests:
          - accepted_values:
              arguments:
                values: ['Accepted', 'Blocked', 'Expired', 'Invalid', 'ConcurrentTx']
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "last_seen_ts >= first_seen_ts"
          config:
            severity: error
  - name: dim_locations
    description: "Conformed location dimension. One row per distinct charging location. SCD Type 1."
    columns:
      - name: location_key
        description: "Surrogate key for the location dimension, generated from location_id."
        data_tests:
          - not_null
          - unique
      - name: location_id
        description: "Natural key. Location identifier sourced from stg_chargers via int_chargers."
        data_tests:
          - not_null
          - unique

  - name: fact_location_capacity
    description: "Physical capacity counts per location. One row per location. Full refresh — counts are overwritten when ports are commissioned or decommissioned. Join to dim_locations on location_key for site-level analysis."
    columns:
      - name: location_key
        description: "Surrogate key matching dim_locations.location_key."
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_locations')
                field: location_key
      - name: location_id
        description: "Natural key. Location identifier sourced from int_ports."
        data_tests:
          - not_null
          - unique
      - name: charger_count
        description: "Number of distinct chargers (devices) at this location."
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
      - name: port_count
        description: "Number of distinct ports (charger + port combinations) at this location."
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
      - name: connector_count
        description: "Number of distinct connectors (charger + port + connector combinations) at this location."
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1

  - name: fact_charger_commissioned_daily
    description: "One row per charger per day between commissioned and decommissioned, with minutes the charger was commissioned that day. Used for uptime and availability metrics."
    columns:
      - name: charger_id
        description: "Charger identifier"
        data_tests:
          - not_null
      - name: date_id
        description: "Calendar day (date)"
        data_tests:
          - not_null
      - name: minutes
        description: "Minutes the charger was commissioned on this day (partial on first/last day of commission range)"
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - charger_id
              - date_id

  - name: fact_uptime
    description: "Port-level daily uptime. One row per Port per day (charger_id + port_id + date_id). Uptime = (commissioned minutes that day − outage minutes) / commissioned minutes. Reliability is tracked at Port grain because a Port is the independently operated unit that serves one EV at a time."
    columns:
      - name: uptime_id
        description: "Surrogate key for the row (charger_id, port_id, date_id)"
        data_tests:
          - unique
          - not_null
      - name: charger_id
        description: "Charger identifier"
        data_tests:
          - not_null
      - name: port_key
        description: "Foreign key to dim_ports. Surrogate key read from dim_ports."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_ports')
                field: port_key
      - name: port_id
        description: "Port identifier within the charger"
        data_tests:
          - not_null
      - name: date_id
        description: "Calendar day (date)"
        data_tests:
          - not_null
      - name: uptime
        description: "Fraction of commissioned minutes that were not outage; 1 = fully up, 0 = fully down"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
