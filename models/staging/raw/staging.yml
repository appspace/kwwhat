
version: 2

sources:
  - name: raw
    description: "raw data"
    database: "{{ var('raw_database', 'RAW') }}"
    schema: "{{ var('raw_schema', 'SEED') }}"

    tables:
      - name: ocpp_logs
        identifier: "{{ var('ocpp_logs_identifier') }}"
        description: "raw OCPP logs"
        config:
          loaded_at_field: timestamp
          freshness:
            warn_after: {count: 2, period: hour}
            error_after: {count: 3, period: hour}
        columns:
          - name: timestamp
            description: "Timestamp when the OCPP message was received in UTC ISO 8601 time notation"
          - name: id
            description: "Charge point identifier (e.g., CH-001)"
          - name: action
            description: "For messages with MessageTypeId = 2,OCPP action type (e.g., BootNotification, StatusNotification, Heartbeat, StartTransaction, StopTransaction, MeterValues, RemoteStartTransaction)"
          - name: msg
            description: "JSON array representing OCPP message. For request messages (MessageTypeId = 2): [2, \"<UniqueId>\", \"<Action>\", <Payload>]. For response messages (MessageTypeId = 3): [3, \"<UniqueId>\", <Payload>]"
      
      - name: ports
        identifier: "{{ var('ports_identifier') }}"
        description: >
          Reference data describing the physical hardware hierarchy: Charger → Port → Connector.
          A Charger (or Charging Station) is the physical system where EVs can be charged; it has one or more Ports.
          A Port (or EVSE) is an independently operated part of the Charger that can deliver energy to one EV at a time — the answer to "how many vehicles can charge simultaneously?" is the number of Ports.
          A Connector is an independently operated electrical outlet on a Port; a Port may have multiple Connectors (socket types or tethered cables) to facilitate different vehicle types — the answer to "what vehicle types can charge?" is determined by the Connector.
        columns:
          - name: charge_point_id
            description: "Charger identifier"
          - name: location_id
            description: "Location identifier where the charger is located"
          - name: port_id
            description: "Port identifier within the charger"
          - name: connector_id
            description: "Connector identifier within the port"
          - name: connector_type
            description: "Type of connector (e.g., CCS, NACS)"
          - name: commissioned_ts
            description: "Timestamp when the charger was commissioned (null if not commissioned yet)"
          - name: decommissioned_ts
            description: "Timestamp when the charger was decommissioned (null if still active)"

models:
  - name: stg_ocpp_logs
    description: "Staging model for raw OCPP logs. Each row is one OCPP message (CALL or CALLRESULT). Grain: one row per charge_point_id + message_type_id + unique_id."
    columns:
      - name: charge_point_id
        description: "Charge point identifier"
        data_tests:
          - not_null
      - name: message_type_id
        description: "OCPP message type: 2 = CALL (request), 3 = CALLRESULT (response)"
        data_tests:
          - not_null
      - name: unique_id
        description: "OCPP message identifier, unique per charge point per direction"
        data_tests:
          - not_null
      - name: ingested_timestamp
        description: "Timestamp when the message was received"
        data_tests:
          - not_null

  - name: stg_ports
    description: >
      Staging model for the hardware reference table. One row per Connector (the finest-grain hardware unit).
      Charger (Charging Station): the physical system a driver perceives as a charger — has one or more Ports.
      Port (EVSE): independently operated part of a Charger that delivers energy to one EV at a time. Reliability and utilisation metrics are tracked at Port grain.
      Connector: an independently operated electrical outlet on a Port, determining which vehicle types can charge (e.g. CCS, NACS, CHAdeMO).
    columns:
      - name: charge_point_id
        description: "Identifier for the Charger (Charging Station) — the physical unit a driver perceives as a single charger."
        data_tests:
          - not_null
      - name: location_id
        description: "Location identifier where the Charger is installed."
        data_tests:
          - not_null
      - name: port_id
        description: "Identifier for the Port (EVSE) within the Charger. Each Port can serve one EV at a time; the Port count answers 'how many vehicles can charge simultaneously?'. Reliability and utilisation metrics are tracked at this grain."
        data_tests:
          - not_null
      - name: connector_id
        description: "Identifier for the Connector within the Port. The Connector type (socket standard) determines which vehicle types can charge."
        data_tests:
          - not_null
      - name: connector_type
        description: "Type of connector (e.g., CCS, NACS)"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['CCS', 'CHAdeMO', 'NACS', 'Type 2', 'Type 1']
      - name: commissioned_ts
        description: "Timestamp when the charge point was commissioned (null if not commissioned yet)"
      - name: decommissioned_ts
        description: "Timestamp when the charge point was decommissioned (null if still active)"
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - charge_point_id
              - port_id
              - connector_id
      - dbt_utils.expression_is_true:
          arguments:
            expression: "commissioned_ts is null or decommissioned_ts is null or commissioned_ts <= decommissioned_ts"
          config:
            severity: error