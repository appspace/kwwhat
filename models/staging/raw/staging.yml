
version: 2

sources:
  - name: raw
    description: "raw data"
    database: "{{ var('raw_database', 'RAW') }}"
    schema: "{{ var('raw_schema', 'SEED') }}"

    tables:
      - name: ocpp_logs
        identifier: "{{ var('ocpp_logs_identifier') }}"
        description: "raw OCPP logs"
        config:
          loaded_at_field: timestamp
          freshness:
            warn_after: {count: 2, period: hour}
            error_after: {count: 3, period: hour}
        columns:
          - name: timestamp
            description: "Timestamp when the OCPP message was received in UTC ISO 8601 time notation"
          - name: id
            description: "Charge point identifier (e.g., CH-001)"
          - name: action
            description: "For messages with MessageTypeId = 2,OCPP action type (e.g., BootNotification, StatusNotification, Heartbeat, StartTransaction, StopTransaction, MeterValues, RemoteStartTransaction)"
          - name: msg
            description: "JSON array representing OCPP message. For request messages (MessageTypeId = 2): [2, \"<UniqueId>\", \"<Action>\", <Payload>]. For response messages (MessageTypeId = 3): [3, \"<UniqueId>\", <Payload>]"
      
      - name: chargers
        identifier: "{{ var('chargers_identifier') }}"
        description: "One row per Charger. Grain: charge_point_id."
        columns:
          - name: charge_point_id
            description: "Charger identifier"
          - name: location_id
            description: "Location identifier where the charger is located"
          - name: commissioned_ts
            description: "Timestamp when the charger was commissioned (null if not yet commissioned)"
          - name: decommissioned_ts
            description: "Timestamp when the charger was decommissioned (null if still commissioned)"

      - name: ports
        identifier: "{{ var('ports_identifier') }}"
        description: "One row per Port. Grain: charge_point_id + port_id."
        columns:
          - name: charge_point_id
            description: "Charger identifier"
          - name: port_id
            description: "Port identifier within the charger"
          - name: max_power_kw
            description: "Maximum rated output power of the Port in kilowatts"

      - name: connectors
        identifier: "{{ var('connectors_identifier') }}"
        description: "One row per Connector. Grain: charge_point_id + port_id + connector_id."
        columns:
          - name: charge_point_id
            description: "Charger identifier"
          - name: port_id
            description: "Port identifier within the charger"
          - name: connector_id
            description: "Connector identifier within the port"
          - name: connector_type
            description: "Type of connector (e.g., CCS, NACS)"
          - name: max_power_kw
            description: "Maximum rated output power of the Connector in kilowatts"

models:
  - name: stg_ocpp_logs
    description: "Staging model for raw OCPP logs. Each row is one OCPP message (CALL or CALLRESULT). Grain: one row per charger_id + message_type_id + unique_id."
    columns:
      - name: charger_id
        description: "Charge point identifier"
        data_tests:
          - not_null
      - name: message_type_id
        description: "OCPP message type: 2 = CALL (request), 3 = CALLRESULT (response)"
        data_tests:
          - not_null
      - name: unique_id
        description: "OCPP message identifier, unique per charge point per direction"
        data_tests:
          - not_null
      - name: ingested_timestamp
        description: "Timestamp when the message was received"
        data_tests:
          - not_null

  - name: stg_chargers
    description: "One row per Charger (Charging Station) — the physical system a driver perceives as a single charger. Grain: charger_id."
    columns:
      - name: charger_id
        description: "Identifier for the Charger (Charging Station)."
        data_tests:
          - not_null
          - unique
      - name: location_id
        description: "Location identifier where the Charger is installed."
        data_tests:
          - not_null
      - name: commissioned_ts
        description: "Timestamp when the Charger was commissioned (null if not yet commissioned)."
      - name: decommissioned_ts
        description: "Timestamp when the Charger was decommissioned (null if still commissioned)."
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "commissioned_ts is null or decommissioned_ts is null or commissioned_ts <= decommissioned_ts"
          config:
            severity: error

  - name: stg_ports
    description: "One row per Port (EVSE) within a Charger. Each Port can serve one EV at a time. Reliability and utilisation metrics are tracked at this grain. Grain: charger_id + port_id."
    columns:
      - name: charger_id
        description: "Identifier for the Charger that contains this Port."
        data_tests:
          - not_null
      - name: port_id
        description: "Identifier for the Port within the Charger."
        data_tests:
          - not_null
      - name: max_power_kw
        description: "Maximum rated output power of the Port in kilowatts (e.g., 50, 150, 350)."
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - charger_id
              - port_id

  - name: stg_connectors
    description: "One row per Connector within a Port. The Connector type (socket standard) determines which vehicle types can charge. Grain: charger_id + port_id + connector_id."
    columns:
      - name: charger_id
        description: "Identifier for the Charger that contains this Connector."
        data_tests:
          - not_null
      - name: port_id
        description: "Identifier for the Port that contains this Connector."
        data_tests:
          - not_null
      - name: connector_id
        description: "Identifier for the Connector within the Port."
        data_tests:
          - not_null
      - name: connector_type
        description: "Type of connector (e.g., CCS, NACS, CHAdeMO)."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['CCS', 'CHAdeMO', 'NACS', 'Type 2', 'Type 1']
      - name: max_power_kw
        description: "Maximum rated output power of the Connector in kilowatts (e.g., 50, 150, 350)."
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - charger_id
              - port_id
              - connector_id